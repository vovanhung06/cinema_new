services:
  backend:
    env_file:
      - ../backend/.env
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - cinema-network

  nginx:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - cinema-network

networks:
  cinema-network:
    driver: bridge